# Best-effort Shadowrocket General -> Mihomo/Clash YAML mapping
# Kept as close as possible without breaking provider-based subscriptions.
# Directly mapped or approximated:
# - bypass-tun / tun-excluded-routes -> tun.route-exclude-address
# - hijack-dns -> tun.dns-hijack
# - dns-server / fallback-dns-server -> dns.nameserver / dns.fallback
# - always-real-ip -> dns.fake-ip-filter
# - dns-direct-system / dns-direct-fallback-proxy -> dns.direct-nameserver + dns.respect-rules + dns.proxy-server-nameserver
# Shadowrocket-only items with no clean Mihomo equivalent were intentionally not emitted as active YAML keys:
# - yaml = true
# - bypass-system = true
# - udp-policy-not-supported-behaviour = REJECT
# - icmp-auto-reply = true
# - always-reject-url-rewrite = true
# - private-ip-answer = false
# - use-local-host-item-for-proxy = false
# - stun-response-ip / stun-response-ipv6
mixed-port: 7890
mode: rule
log-level: info
ipv6: false
unified-delay: true
tun:
  enable: true
  stack: system
  auto-route: true
  strict-route: true
  auto-detect-interface: true
  dns-hijack:
  - any:53
  - tcp://any:53
  route-exclude-address:
  - 10.0.0.0/8
  - 100.64.0.0/10
  - 127.0.0.0/8
  - 169.254.0.0/16
  - 172.16.0.0/12
  - 192.0.0.0/24
  - 192.0.2.0/24
  - 192.88.99.0/24
  - 192.168.0.0/16
  - 198.18.0.0/15
  - 198.51.100.0/24
  - 203.0.113.0/24
  - 233.252.0.0/24
  - 224.0.0.0/4
  - 255.255.255.255/32
  - ::1/128
  - ::ffff:0:0/96
  - ::ffff:0:0:0/96
  - 64:ff9b::/96
  - 64:ff9b:1::/48
  - 100::/64
  - 2001::/32
  - 2001:20::/28
  - 2001:db8::/32
  - 2002::/16
  - 3fff::/20
  - 5f00::/16
  - fc00::/7
  - fe80::/10
  - ff00::/8
  - 239.255.255.250/32
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-filter-mode: blacklist
  use-hosts: true
  use-system-hosts: true
  respect-rules: true
  default-nameserver: &id001
  - 223.5.5.5
  - 119.29.29.29
  nameserver: *id001
  direct-nameserver: *id001
  direct-nameserver-follow-policy: true
  proxy-server-nameserver: &id002
  - https://lion.madns-apple.site:2443/dns-query
  - https://eagle.madns-orange.site:2443/dns-query
  - https://panda.madns-banana.site:2443/dns-query
  - https://shark.madns-grape.site:2443/dns-query
  - https://zebra.madns-mango.site:2443/dns-query
  - https://dns.cloudflare.com/dns-query
  - https://dns.twnic.tw/dns-query
  - tls://8.8.4.4:853
  fallback: *id002
  fallback-filter:
    geoip: true
    geoip-code: CN
  fake-ip-filter:
  - '*.lan'
  - '*.local'
  - localhost
  - sequoia.apple.com
  - seed-sequoia.siri.apple.com
  - '*.ls.apple.com'
  - '*.apple.com'
  - '*.icloud.com'
  - captive.apple.com
  - tplogin.cn
  - miwifi.com
  - falogin.cn
  - asusrouter.com
  - router.asus.com
  - '*.ccb.com'
  - '*.abchina.com.cn'
  - '*.psbc.com'
  - www.baidu.com
  - www.163.com
hosts:
  localhost: 127.0.0.1
proxy-providers:
  cocoduck:
    type: http  
    url: https://sub.cocoduck.cc/link/f931c32eb11c51a7?sip002=1
    path: ./providers/cocoduck.yaml
    interval: 3600
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 600
proxy-groups:
- name: 节点选择
  type: select
  proxies:
  - 自动选择
  - 🇭🇰 HK
  - 🇨🇳 TW
  - 🇺🇸 US
  - 🇰🇷 KR
  - 🇷🇺 RU
  - 🇬🇧 UK
  - 🇯🇵 JP
  - 🇸🇬 SG
  - 🇮🇳 IN
  - 🇩🇪 GE
  - 🇨🇦 CA
  - DIRECT
- name: 自动选择
  type: url-test
  use:
  - cocoduck
  filter: ^(?!.*(国内|限速|试用)).*$
  url: http://www.gstatic.com/generate_204
  interval: 600
  tolerance: 100
- name: 🇭🇰 HK
  type: url-test
  use:
  - cocoduck
  filter: (?i)^(?=.*(港|hk|hong))(?!.*(台湾|tw|taiwan|日本|jp|japan|新加坡|sg|singapore|美国|us|states|american|韩国|kr|korea|狮城)).*$
  url: http://www.gstatic.com/generate_204
  interval: 600
  tolerance: 0
- name: 🇨🇳 TW
  type: url-test
  use:
  - cocoduck
  filter: (?i)^(?=.*(台|tw|taiwan))(?!.*(港|hk|hong|日|jp|japan|韩|kr|korea|新|sg|singapore|美|us|states)).*$
  url: http://www.gstatic.com/generate_204
  interval: 600
  tolerance: 0
- name: 🇺🇸 US
  type: url-test
  use:
  - cocoduck
  filter: (?i)^(?=.*(美国|美國|us|los angeles|seattle|states|american))(?!.*(香港|hk|hong|台湾|tw|taiwan|日本|jp|japan|新加坡|sg|singapore|韩国|kr|korea|狮城)).*$
  url: http://www.gstatic.com/generate_204
  interval: 600
  tolerance: 0
- name: 🇰🇷 KR
  type: url-test
  use:
  - cocoduck
  filter: (?i)^(?=.*(kr|korea|kor|首尔|韩|韓))(?!.*(香港|hk|hong|台湾|tw|taiwan|新加坡|sg|singapore|美国|us|狮城)).*$
  url: http://www.gstatic.com/generate_204
  interval: 600
  tolerance: 0
- name: 🇷🇺 RU
  type: url-test
  use:
  - cocoduck
  filter: (?i)(🇷🇺|俄罗斯|ru|莫斯科|圣彼得堡|喀山|哈尔科夫|乌法|新西伯利亚|下诺夫哥罗德|沃罗涅什)
  url: http://www.gstatic.com/generate_204
  interval: 600
  tolerance: 0
- name: 🇬🇧 UK
  type: url-test
  use:
  - cocoduck
  filter: (?i)(🇬🇧|英国|uk|伦敦|england|英格兰|伯明翰|利兹|爱丁堡|格拉斯哥|苏格兰)
  url: http://www.gstatic.com/generate_204
  interval: 600
  tolerance: 0
- name: 🇯🇵 JP
  type: url-test
  use:
  - cocoduck
  filter: (?i)^(?=.*(日本|jp|japan))(?!.*(香港|hk|hong|台湾|tw|taiwan|新加坡|sg|singapore|美国|us|韩国|kr|korea|狮城)).*$
  url: http://www.gstatic.com/generate_204
  interval: 600
  tolerance: 0
- name: 🇸🇬 SG
  type: url-test
  use:
  - cocoduck
  filter: (?i)^(?=.*(新加坡|狮城|sg|singapore))(?!.*(香港|hk|hong|台湾|tw|taiwan|日本|jp|japan|美国|us|韩国|kr|korea)).*$
  url: http://www.gstatic.com/generate_204
  interval: 600
  tolerance: 0
- name: 🇮🇳 IN
  type: url-test
  use:
  - cocoduck
  filter: (?i)(🇮🇳|印度|\bin\b|ind|孟买|新德里|高知|republic of india|india)
  url: http://www.gstatic.com/generate_204
  interval: 600
  tolerance: 0
- name: 🇩🇪 GE
  type: url-test
  use:
  - cocoduck
  filter: (?i)(🇩🇪|德国|deu|\bde\b|柏林|慕尼黑|汉堡|科隆|germany)
  url: http://www.gstatic.com/generate_204
  interval: 600
  tolerance: 0
- name: 🇨🇦 CA
  type: url-test
  use:
  - cocoduck
  filter: (?i)(🇨🇦|加拿大|\bca\b|渥太华|canada)
  url: http://www.gstatic.com/generate_204
  interval: 600
  tolerance: 0
